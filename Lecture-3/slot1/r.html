<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border-radius</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            border: 2px solid black;
            background-color: orange;
            border-radius: 10px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
